name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          gradle-version: current
          cache-provider: basic
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Cache IntelliJ Platform SDK
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches/modules-2/files-2.1/com.jetbrains.intellij.idea
            ~/.gradle/caches/modules-2/files-2.1/com.jetbrains
          key: intellij-sdk-${{ hashFiles('build.gradle.kts') }}
          restore-keys: intellij-sdk-

      - name: Install ktlint
        run: |
          curl -sSLo ./ktlint https://github.com/pinterest/ktlint/releases/download/1.8.0/ktlint
          chmod +x ./ktlint

      - name: Lint
        run: make lint KTLINT=./ktlint

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: build/reports/tests/
          retention-days: 7

  verify:
    name: Verify Plugin
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          gradle-version: current
          cache-provider: basic
          cache-read-only: true

      - name: Cache IntelliJ Platform SDK
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches/modules-2/files-2.1/com.jetbrains.intellij.idea
            ~/.gradle/caches/modules-2/files-2.1/com.jetbrains
          key: intellij-sdk-${{ hashFiles('build.gradle.kts') }}
          restore-keys: intellij-sdk-

      - name: Verify plugin structure
        run: make verify

  package:
    name: Package Plugin
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          gradle-version: current
          cache-provider: basic
          cache-read-only: true

      - name: Cache IntelliJ Platform SDK
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches/modules-2/files-2.1/com.jetbrains.intellij.idea
            ~/.gradle/caches/modules-2/files-2.1/com.jetbrains
          key: intellij-sdk-${{ hashFiles('build.gradle.kts') }}
          restore-keys: intellij-sdk-

      - name: Build plugin ZIP
        run: make package

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: rexx-plugin-${{ github.sha }}
          path: build/distributions/*.zip
          retention-days: 30
          if-no-files-found: error
