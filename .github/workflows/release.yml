name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          gradle-version: current
          cache-provider: basic

      - name: Cache IntelliJ Platform SDK
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches/modules-2/files-2.1/com.jetbrains.intellij.idea
            ~/.gradle/caches/modules-2/files-2.1/com.jetbrains
          key: intellij-sdk-${{ hashFiles('build.gradle.kts') }}
          restore-keys: intellij-sdk-

      - name: Build
        run: make build

      - name: Verify plugin
        run: make verify

      - name: Build plugin ZIP
        run: make package

      - name: Resolve artifact path
        id: artifact
        run: |
          ZIP=$(ls build/distributions/*.zip | head -1)
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $ZIP)" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = context.ref.replace('refs/tags/', '') || '${{ inputs.tag }}';
            const zipPath = '${{ steps.artifact.outputs.path }}';
            const zipName = '${{ steps.artifact.outputs.name }}';

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Rexx Plugin ${tag}`,
              body: `## Rexx Language Support ${tag}\n\n### Installation\n1. Download the ZIP below.\n2. Open IDE → Settings → Plugins → Install Plugin from Disk.\n3. Select the downloaded ZIP.\n\n### Changes\nSee [CHANGELOG.md](CHANGELOG.md).`,
              draft: false,
              prerelease: tag.includes('-'),
            });

            const content = fs.readFileSync(zipPath);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: zipName,
              data: content,
            });

            console.log(`Release created: ${release.data.html_url}`);
